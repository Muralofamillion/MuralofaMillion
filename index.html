<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fullscreen Square Slide</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
  }

  /* Fullscreen square */
  .square {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #4cc9f0, #3a0ca3);
    transition: transform 0.8s ease;
    
  }
  /* Button floats above it */
  .button {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 24px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    background: #f72585;
    color: white;
    z-index: 10;
    transition: transform 0.8s ease;
    font-weight: bold;
    border: 2px solid white;
  }

  /* Slide everything up */
  .up .square,
  .up .button {
    transform: translateY(-120vh);
  }
</style>
</head>

<body>

<div id="container">
  <div class="square">
  <h1>Launch Ready</h1>
  </div>
  <button class="button" onclick="goUp()">Understood</button>
</div>

<script>
  function goUp() {
    document.getElementById("container").classList.add("up");
  }
</script>

</body>
</html>
